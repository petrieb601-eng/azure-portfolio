{% extends "base.html" %}

{% block title %}AI Sentiment Analysis - Bryan Petrie{% endblock %}

{% block content %}
<div class="sentiment-container">
    <h1>AI-Powered Sentiment Analysis</h1>
    <p>Enter text below to analyze its sentiment using Azure AI</p>
    
    <div class="sentiment-input">
        <textarea id="textInput" rows="6" placeholder="Enter text to analyze... (e.g., 'I love this product!' or 'This was terrible.')"></textarea>
        <button onclick="analyzeSentiment()" class="btn">Analyze Sentiment</button>
    </div>
    
    <div id="results" class="results hidden">
        <h2>Results:</h2>
        <div class="sentiment-result">
            <div class="sentiment-label">Overall Sentiment: <span id="sentiment"></span></div>
            <div class="confidence-scores">
                <div class="score positive">
                    <span>Positive:</span>
                    <div class="progress-bar">
                        <div class="progress" id="positiveBar"></div>
                    </div>
                    <span id="positiveScore"></span>
                </div>
                <div class="score neutral">
                    <span>Neutral:</span>
                    <div class="progress-bar">
                        <div class="progress" id="neutralBar"></div>
                    </div>
                    <span id="neutralScore"></span>
                </div>
                <div class="score negative">
                    <span>Negative:</span>
                    <div class="progress-bar">
                        <div class="progress" id="negativeBar"></div>
                    </div>
                    <span id="negativeScore"></span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="error" class="error hidden"></div>
</div>

<style>
.sentiment-container {
    max-width: 800px;
    margin: 0 auto;
}

.sentiment-input {
    margin: 2rem 0;
}

#textInput {
    width: 100%;
    padding: 1rem;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 1rem;
}

.results {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin-top: 2rem;
}

.hidden {
    display: none;
}

.sentiment-label {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
}

#sentiment {
    font-weight: bold;
    color: #3498db;
}

.confidence-scores {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.score {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.progress-bar {
    flex: 1;
    height: 30px;
    background: #f0f0f0;
    border-radius: 15px;
    overflow: hidden;
}

.progress {
    height: 100%;
    transition: width 0.5s ease;
}

.positive .progress { background: #2ecc71; }
.neutral .progress { background: #95a5a6; }
.negative .progress { background: #e74c3c; }

.error {
    background: #e74c3c;
    color: white;
    padding: 1rem;
    border-radius: 5px;
    margin-top: 1rem;
}
</style>

<script>
async function analyzeSentiment() {
    const text = document.getElementById('textInput').value;
    
    if (!text.trim()) {
        alert('Please enter some text to analyze');
        return;
    }
    
    document.getElementById('results').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
    
    try {
        const response = await fetch('/analyze', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: text })
        });
        
        const data = await response.json();
        
        if (data.error) {
            document.getElementById('error').textContent = data.error;
            document.getElementById('error').classList.remove('hidden');
            return;
        }
        
        // Display results
        document.getElementById('sentiment').textContent = data.sentiment.toUpperCase();
        document.getElementById('positiveScore').textContent = (data.positive * 100).toFixed(1) + '%';
        document.getElementById('neutralScore').textContent = (data.neutral * 100).toFixed(1) + '%';
        document.getElementById('negativeScore').textContent = (data.negative * 100).toFixed(1) + '%';
        
        document.getElementById('positiveBar').style.width = (data.positive * 100) + '%';
        document.getElementById('neutralBar').style.width = (data.neutral * 100) + '%';
        document.getElementById('negativeBar').style.width = (data.negative * 100) + '%';
        
        document.getElementById('results').classList.remove('hidden');
        
    } catch (error) {
        document.getElementById('error').textContent = 'Failed to analyze sentiment: ' + error;
        document.getElementById('error').classList.remove('hidden');
    }
}
</script>
{% endblock %}
